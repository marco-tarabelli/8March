<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festa della Donna 💜</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a40, #3a0ca3, #7209b7);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    flex-direction: column;
}

h1 {
    font-size: 3em;
    text-align: center;
    z-index: 10;
    opacity: 0;
    transform: scale(0.7);
    animation: smoothReveal 2.5s ease-out forwards;
    text-shadow:
        0 0 10px rgba(255,255,255,0.6),
        0 0 20px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,1);
}

@keyframes smoothReveal {
    0% { opacity: 0; transform: scale(0.7); filter: blur(6px); }
    70% { opacity: 1; transform: scale(1.05); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

.mimosa {
    position: absolute;
    width: 55px;
    animation: float linear infinite;
    pointer-events: none;
    filter:
        drop-shadow(0 0 8px #fff700)
        drop-shadow(0 0 18px #ffd60a)
        drop-shadow(0 0 30px #ffea00);
}

@keyframes float {
    from { transform: translateY(0) rotate(0deg); opacity:1; }
    to { transform: translateY(-200px) rotate(360deg); opacity:0; }
}

.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* FOTO + ANIMAZIONE */
#foto-container {
    margin-top: 20px;
    text-align: center;
    color: #ffd60a;
    font-size: 1.5em;
    cursor: pointer;
    display: none;
}

#foto-container img {
    display: none;
    max-width: 200px;
    border-radius: 10px;
    margin-top: 10px;
    transform: scale(0);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(.68,-0.55,.27,1.55), opacity 0.8s ease-in-out;
}

#foto-container .descrizione {
    display: none;
    font-size: 1.2em;
    margin-top: 10px;
    color: #ffd60a;
}
</style>
</head>

<body>

<h1 id="main-text">Ciao Nome!</h1>

<div id="foto-container">Clicca qui
    <img id="regalo-foto" src="regalo.jpg" alt="Regalo">
    <div class="descrizione">Ecco il tuo regalo, una sedia 😏</div>
</div>

<script>
function createMimosa() {
    const mimosa = document.createElement("div");
    mimosa.classList.add("mimosa");
    const side = Math.floor(Math.random()*3);
    if(side===0){
        mimosa.style.top = window.innerHeight + "px";
        mimosa.style.left = Math.random() * window.innerWidth + "px";
    } else if(side===1){
        mimosa.style.top = Math.random() * window.innerHeight + "px";
        mimosa.style.left = "-60px";
    } else {
        mimosa.style.top = Math.random() * window.innerHeight + "px";
        mimosa.style.left = window.innerWidth + "px";
    }
    mimosa.style.animationDuration = (4 + Math.random()*4) + "s";
    mimosa.style.transform = "scale(" + (0.9 + Math.random()*1.2) + ")";
    mimosa.innerHTML = `<svg viewBox="0 0 100 100">
        <line x1="50" y1="10" x2="50" y2="90" stroke="#38b000" stroke-width="5"/>
        ${generateFlowers()}
    </svg>`;
    document.body.appendChild(mimosa);
    setTimeout(()=> mimosa.remove(),9000);
}

function generateFlowers(){
    let flowers="";
    for(let i=0;i<16;i++){
        let cx=50 + (Math.random()*50-25);
        let cy=15 + (Math.random()*60);
        flowers+=`<circle cx="${cx}" cy="${cy}" r="10" fill="#ffea00"/>`;
    }
    return flowers;
}

function createSparkle(){
    const sparkle=document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.style.left=Math.random()*window.innerWidth+"px";
    sparkle.style.top=Math.random()*window.innerHeight+"px";
    sparkle.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(sparkle);
    setTimeout(()=> sparkle.remove(),5000);
}

setInterval(createMimosa,200);
setInterval(createSparkle,150);

/* CAMBIO SCRITTA DOPO 5s */
<!-- Parte del <script> da sostituire -->
/* CAMBIO SCRITTA CON ANIMAZIONE */
setTimeout(()=>{
    const mainText = document.getElementById("main-text");

    // Animazione uscita
    mainText.style.transition = "all 0.8s ease-in-out";
    mainText.style.opacity = "0";
    mainText.style.transform = "scale(0.5)";

    // Dopo la transizione, cambio testo e faccio apparire in modo carino
    setTimeout(()=>{
        mainText.innerText = "Tanti auguri per la Festa della Donna 💛";
        mainText.style.opacity = "0";
        mainText.style.transform = "scale(0.5)";

        // Animazione entrata
        setTimeout(()=>{
            mainText.style.transition = "all 1s cubic-bezier(.68,-0.55,.27,1.55)";
            mainText.style.opacity = "1";
            mainText.style.transform = "scale(1)";
        },50);

        // Dopo 3s appare il pulsante
        setTimeout(()=>{
            const fotoContainer = document.getElementById("foto-container");
            fotoContainer.style.display="block";
        },3000);

    },800);

},5000);
/* CLICK SU FOTO CON ANIMAZIONE */
const fotoContainer = document.getElementById("foto-container");
fotoContainer.addEventListener("click",()=>{
    const img = document.getElementById("regalo-foto");
    const descr = fotoContainer.querySelector(".descrizione");
    
    // Mostra foto e descrizione
    img.style.display="block";
    descr.style.display="block";

    // Animazione buffa: fade + zoom + bounce
    setTimeout(()=>{
        img.style.transform = "scale(1.2)";
        img.style.opacity = "1";
        setTimeout(()=> img.style.transform="scale(1)", 600); // rimbalzo leggero
    }, 50);

    // Puliamo il testo clicca qui
    fotoContainer.innerText = "";
    fotoContainer.appendChild(img);
    fotoContainer.appendChild(descr);
});
</script>

</body>
</html>
